<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiKS · Tour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --coffee:#161009;--bone:#f0e7d8;--sand:#cdb896;--mist:#8f8069;
    --gold:#f3c969;--ochre:#e09f3e;--clay:#c9552e;
    --hair:rgba(224,159,62,.22);--hair-dim:rgba(224,159,62,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%}
  body{background:var(--coffee);color:var(--bone);font-family:'Sora',sans-serif;overflow-x:hidden}
  .mono{font-family:'IBM Plex Mono',monospace}

  /* half-speed video backdrop */
  #bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:#0d0906}
  #bg video{position:absolute;left:50%;top:50%;width:104%;height:104%;
    transform:translate(-50%,-50%);object-fit:cover;filter:brightness(.5) saturate(1.1) contrast(1.02)}
  #bg::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(12,8,4,.72),rgba(12,8,4,.4) 30%,rgba(12,8,4,.55) 70%,rgba(12,8,4,.9));}
  header,main,footer{position:relative;z-index:2}

  header{display:flex;justify-content:center;align-items:center;position:relative;padding:24px 42px 16px}
  .brand{position:absolute;left:42px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:11px}
  .brand img{height:34px;opacity:.95}
  .brand b{font-weight:600;letter-spacing:.32em;font-size:43px;color:var(--gold)}
  nav{display:flex;gap:30px}
  nav a{color:var(--mist);text-decoration:none;font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.26em;transition:color .3s}
  nav a:hover,nav a.on{color:var(--gold)}

  main{max-width:1000px;margin:0 auto;padding:5vh 24px 12vh}
  .head{text-align:center;margin-bottom:6vh}
  .head .kick{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.5em;color:var(--gold);text-transform:uppercase}
  .head h1{font-weight:200;font-size:clamp(64px,13vw,168px);line-height:.9;letter-spacing:-.02em;margin-top:14px;
    background:linear-gradient(175deg,var(--bone) 30%,var(--sand) 65%,var(--ochre));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .head p{margin-top:18px;color:var(--sand);font-weight:300;font-size:15px;letter-spacing:.02em}

  .dates{display:flex;flex-direction:column;gap:2px;
    border-top:1px solid var(--hair-dim);}
  .row{
    display:grid;grid-template-columns:130px 1fr auto;align-items:center;gap:20px;
    padding:22px 10px;border-bottom:1px solid var(--hair-dim);
    transition:background .3s,padding-left .3s;
  }
  .row:hover{background:rgba(224,159,62,.05);padding-left:20px}
  .row .date{font-family:'IBM Plex Mono';font-size:13px;color:var(--gold);letter-spacing:.05em}
  .row .date span{display:block;color:var(--mist);font-size:10px;margin-top:3px}
  .row .place{min-width:0}
  .row .place b{font-weight:400;font-size:19px;letter-spacing:.01em}
  .row .place em{display:block;font-style:normal;color:var(--mist);font-family:'IBM Plex Mono';
    font-size:10px;letter-spacing:.16em;text-transform:uppercase;margin-top:4px}
  .row a.tix{
    font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--bone);border:1px solid var(--hair);border-radius:999px;padding:11px 22px;
    text-decoration:none;transition:all .3s;white-space:nowrap;
  }
  .row a.tix:hover{border-color:var(--gold);background:rgba(224,159,62,.1);box-shadow:0 0 22px -8px rgba(224,159,62,.5)}
  .row.sold a.tix{color:var(--mist);border-color:var(--hair-dim);pointer-events:none}

  footer{text-align:center;padding:26px 0 40px}
  footer .m{font-family:'IBM Plex Mono';font-size:9px;letter-spacing:.28em;color:var(--mist);text-transform:uppercase}

  @media (max-width:640px){
    nav{display:none}
    .row{grid-template-columns:88px 1fr;gap:12px;row-gap:8px}
    .row a.tix{grid-column:1/3;justify-self:start}
    .row .place b{font-size:16px}
  }
</style>
</head>
<body>

<div id="bg"><video src="media/tour.mp4" muted loop playsinline autoplay></video></div>

<header>
  <div class="brand"><img src="media/logo.png" alt="MiKS logo"><b>MiKS</b></div>
  <nav>
    <a href="index.html">HOME</a>
    <a href="music.html">MUSIC</a>
    <a href="tour.html" class="on">TOUR</a>
    <a href="#" onclick="return false">PROJECTS</a>
    <a href="#" onclick="return false">SHOP</a>
    <a href="#" onclick="return false">CONTACT</a>
  </nav>
</header>

<main>
  <div class="head">
    <span class="kick">Live · 2025 / 2026</span>
    <h1>Tour</h1>
    <p>Where the pulse travels next. Bring your own two.</p>
  </div>
  <div class="dates" id="dates"></div>
</main>

<footer><span class="m">© MiKS · all blends live · all rights reserved</span></footer>

<script>
  /* half-speed loop */
  const v=document.querySelector('#bg video');
  const half=()=>{v.playbackRate=0.5;};
  v.addEventListener('loadedmetadata',half);
  v.addEventListener('play',half);
  const kick=()=>{v.playbackRate=0.5;v.play().catch(()=>{});};
  kick();
  ['pointerdown','touchstart','keydown','scroll'].forEach(e=>addEventListener(e,kick,{passive:true,once:true}));

  /* tour dates — edit freely */
  const DATES=[
    {d:'MAY 03',y:'2025',city:'Lisboa',venue:'Lux Frágil',status:''},
    {d:'MAY 17',y:'2025',city:'Berlin',venue:'Watergate',status:'sold'},
    {d:'JUN 07',y:'2025',city:'Amsterdam',venue:'Shelter',status:''},
    {d:'JUN 21',y:'2025',city:'Cape Town',venue:'Modular',status:''},
    {d:'JUL 12',y:'2025',city:'London',venue:'Phonox',status:''},
    {d:'AUG 02',y:'2025',city:'Luanda',venue:'Chá de Caxinde',status:''},
    {d:'SEP 06',y:'2025',city:'Paris',venue:'Rex Club',status:'sold'},
    {d:'OCT 18',y:'2025',city:'New York',venue:'Nowadays',status:''},
  ];
  const box=document.getElementById('dates');
  DATES.forEach(t=>{
    const r=document.createElement('div');
    r.className='row'+(t.status==='sold'?' sold':'');
    r.innerHTML=`
      <div class="date">${t.d}<span>${t.y}</span></div>
      <div class="place"><b>${t.city}</b><em>${t.venue}</em></div>
      <a class="tix" href="#" onclick="return false">${t.status==='sold'?'Sold out':'Tickets'}</a>`;
    box.appendChild(r);
  });
</script>
</body>
</html>
